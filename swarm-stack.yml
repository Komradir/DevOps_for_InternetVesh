version: "3.8"

services:
  dataB-primal:
    image: postgres
    environment:
      POSTGRES_USER: postgressUser
      POSTGRES_PASSWORD: postgressUser
      POSTGRES_DB: DataBas
  dataB-replica:
    image: postgres
    environment:
      POSTGRES_USER: postgressUser
      POSTGRES_PASSWORD: postgressUser
      POSTGRES_DB: DataBas

  pgadmin:
    image: dpage/pgadmin4:9.8
    ports:
       - 5050:80
    configs:
    - source: pgadmin-servers-v6
      target: /pgadmin4/servers.json
    environment:
      # Required by pgAdmin
      PGADMIN_DEFAULT_EMAIL: demo@example.com
      PGADMIN_DEFAULT_PASSWORD: secret

      # Don't require the user to login
      PGADMIN_CONFIG_SERVER_MODE: 'False'

      # Don't require a "master" password after logging in
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'

configs:
  pgadmin-servers-v6:
    file: ./servers.json
